# Copy to /etc/nginx/sites-available/eye-eye.ropca.kz on the server.
# proxy_pass port must match web binding (default 3014).
# TLS: certbot --nginx -d eye-eye.ropca.kz

server {
    listen 80;
    server_name eye-eye.ropca.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name eye-eye.ropca.kz;

    # Managed by Certbot after first run:
    # ssl_certificate /etc/letsencrypt/live/eye-eye.ropca.kz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/eye-eye.ropca.kz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 420M;

    # NextAuth session cookies (JWT + refresh token) exceed default proxy header buffers.
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    large_client_header_buffers 4 32k;

    location / {
        proxy_pass http://127.0.0.1:3014;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
