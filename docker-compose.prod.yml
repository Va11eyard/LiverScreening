
services:
  postgres:
    ports: !reset []

  api:
    ports: !reset []
    environment:
      APP_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      UPLOAD_DIR: /data/uploads
      EXCEL_EXPORT_DIR: /data/exports/weekly
    volumes:
      - liver_uploads:/data/uploads
      - liver_exports:/data/exports

  web:
    ports:
      - "127.0.0.1:3014:3004"
    environment:
      APP_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      API_URL: http://api:8080
      API_PROXY_TARGET: http://api:8080
